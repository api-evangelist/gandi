    serviceName: Gandi Certificate API
    serviceCategory: API
  - name: Gandi Email API
    baseURL: ''
    tags:
      - Email
    serviceName: Gandi Email API
    serviceCategory: API
  - name: Gandi Billing API
    baseURL: ''
    tags:
      - Billing
    serviceName: Gandi Billing API
    serviceCategory: API
  - name: Gandi Organization API
    baseURL: ''
    tags:
      - Organization
