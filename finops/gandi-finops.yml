specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Gandi
providerId: gandi
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Domains
  - DNS
  - Registrar
description: 'FOCUS-aligned FinOps for Gandi: per-resource purchase model. Charges accrue on
  domain registration / renewal / transfer (per TLD per year), mailbox subscriptions, and any
  optional add-ons. The Public API itself is free for account holders.'
sources:
  - https://www.gandi.net/en/pricing
  - https://api.gandi.net/docs/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Gandi SAS
serviceCategory: Domain Registrar & DNS
billingModel:
  pricingCategory: Per-Resource Purchase
  billingFrequency: Per-Invoice
  billingCurrency: USD/EUR
  chargeCategories:
    - Purchase
    - Tax
    - Refund
    - Adjustment
focusColumns:
  ServiceName: Gandi
  ServiceCategory: Domain Registrar & DNS
  ProviderName: Gandi
  PublisherName: Gandi SAS
  InvoiceIssuerName: Gandi SAS
  BillingCurrency: USD
meters:
  - name: domain_registrations
    unit: domain-year
    aggregation: sum
    dimensions:
      - tld
      - action
  - name: mailboxes
    unit: mailbox-month
    aggregation: max
    dimensions:
      - plan
  - name: ssl_certificates
    unit: certificate
    aggregation: sum
    dimensions:
      - type
  - name: api_calls
    unit: request
    aggregation: sum
    dimensions:
      - api_product
principles:
  - name: Visibility
    description: Use the Gandi Billing API and the account billing dashboard to enumerate
      registered resources and upcoming renewals; reconcile against invoices.
  - name: Allocation
    description: Tag domains to projects/teams via Gandi's organization model; segregate API
      tokens (PATs) per consumer to attribute API-driven purchases.
  - name: Optimization
    description: Take advantage of promotional first-year TLDs; consolidate renewal cycles;
      use included free SSL and DNS rather than separate vendors.
  - name: Accountability
    description: Domain ops owns renewal calendar; finance reviews TLD-mix and registrar-fee
      variance at quarter-end.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
