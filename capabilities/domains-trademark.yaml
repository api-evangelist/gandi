naftiko: 1.0.0-alpha2
info:
  label: Gandi Domain API — Trademark
  description: 'Gandi Domain API — Trademark. 1 operations. Lead operation: Get trademark claims. Self-contained Naftiko capability
    covering one Gandi business surface.'
  tags:
  - Gandi
  - Trademark
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GANDI_API_KEY: GANDI_API_KEY
capability:
  consumes:
  - type: http
    namespace: domains-trademark
    baseUri: https://api.gandi.net/v5/domain
    description: Gandi Domain API — Trademark business capability. Self-contained, no shared references.
    resources:
    - name: domains-domain-claims
      path: /domains/{domain}/claims
      operations:
      - name: get
        method: GET
        description: Get trademark claims
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.GANDI_API_KEY}}'
  exposes:
  - type: rest
    namespace: domains-trademark-rest
    port: 8080
    description: REST adapter for Gandi Domain API — Trademark. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/domains/{domain}/claims
      name: domains-domain-claims
      description: REST surface for domains-domain-claims.
      operations:
      - method: GET
        name: get
        description: Get trademark claims
        call: domains-trademark.get
        with:
          domain: rest.domain
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: domains-trademark-mcp
    port: 9090
    transport: http
    description: MCP adapter for Gandi Domain API — Trademark. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-trademark-claims
      description: Get trademark claims
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: domains-trademark.get
      with:
        domain: tools.domain
      outputParameters:
      - type: object
        mapping: $.
