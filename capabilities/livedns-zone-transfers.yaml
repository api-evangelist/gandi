        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fqdn
          in: path
          type: string
          required: true
        - name: ip
          in: path
          type: string
          required: true
      - name: put
        method: PUT
        description: Add slave server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
