naftiko: 1.0.0-alpha2
info:
  label: Gandi LiveDNS API — Domains
  description: 'Gandi LiveDNS API — Domains. 5 operations. Lead operation: List domains. Self-contained Naftiko capability
    covering one Gandi business surface.'
  tags:
  - Gandi
  - Domains
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GANDI_API_KEY: GANDI_API_KEY
capability:
  consumes:
  - type: http
    namespace: livedns-domains
    baseUri: https://api.gandi.net/v5/livedns
    description: Gandi LiveDNS API — Domains business capability. Self-contained, no shared references.
    resources:
    - name: domains
      path: /domains
      operations:
      - name: get
        method: GET
        description: List domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post
        method: POST
        description: Add a domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: domains-fqdn
      path: /domains/{fqdn}
      operations:
      - name: get
        method: GET
        description: Get domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fqdn
          in: path
          type: string
          required: true
      - name: patch
        method: PATCH
        description: Update domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fqdn
          in: path
          type: string
          required: true
    - name: domains-fqdn-nameservers
      path: /domains/{fqdn}/nameservers
      operations:
      - name: get
        method: GET
        description: Get nameservers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fqdn
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.GANDI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: livedns-domains-rest
    port: 8080
    description: REST adapter for Gandi LiveDNS API — Domains. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/domains
      name: domains
      description: REST surface for domains.
      operations:
      - method: GET
        name: get
        description: List domains
        call: livedns-domains.get
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Add a domain
        call: livedns-domains.post
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/domains/{fqdn}
      name: domains-fqdn
      description: REST surface for domains-fqdn.
      operations:
      - method: GET
        name: get
        description: Get domain
        call: livedns-domains.get
        with:
          fqdn: rest.fqdn
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patch
        description: Update domain
        call: livedns-domains.patch
        with:
          fqdn: rest.fqdn
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/domains/{fqdn}/nameservers
      name: domains-fqdn-nameservers
      description: REST surface for domains-fqdn-nameservers.
      operations:
      - method: GET
        name: get
        description: Get nameservers
        call: livedns-domains.get
        with:
          fqdn: rest.fqdn
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: livedns-domains-mcp
    port: 9090
    transport: http
    description: MCP adapter for Gandi LiveDNS API — Domains. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-domains
      description: List domains
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: livedns-domains.get
      outputParameters:
      - type: object
        mapping: $.
    - name: add-domain
      description: Add a domain
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: livedns-domains.post
      outputParameters:
      - type: object
        mapping: $.
    - name: get-domain
      description: Get domain
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: livedns-domains.get
      with:
        fqdn: tools.fqdn
      outputParameters:
      - type: object
        mapping: $.
    - name: update-domain
      description: Update domain
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: livedns-domains.patch
      with:
        fqdn: tools.fqdn
      outputParameters:
      - type: object
        mapping: $.
    - name: get-nameservers
      description: Get nameservers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: livedns-domains.get
      with:
        fqdn: tools.fqdn
      outputParameters:
      - type: object
        mapping: $.
