naftiko: 1.0.0-alpha2
info:
  label: Gandi Domain API — Domains
  description: 'Gandi Domain API — Domains. 4 operations. Lead operation: List domains. Self-contained Naftiko capability
    covering one Gandi business surface.'
  tags:
  - Gandi
  - Domains
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GANDI_API_KEY: GANDI_API_KEY
capability:
  consumes:
  - type: http
    namespace: domains-domains
    baseUri: https://api.gandi.net/v5/domain
    description: Gandi Domain API — Domains business capability. Self-contained, no shared references.
    resources:
    - name: domains
      path: /domains
      operations:
      - name: get
        method: GET
        description: List domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post
        method: POST
        description: Register domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: domains-domain
      path: /domains/{domain}
      operations:
      - name: get
        method: GET
        description: Get domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain
          in: path
          type: string
          required: true
      - name: delete
        method: DELETE
        description: Delete domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.GANDI_API_KEY}}'
  exposes:
  - type: rest
    namespace: domains-domains-rest
    port: 8080
    description: REST adapter for Gandi Domain API — Domains. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/domains
      name: domains
      description: REST surface for domains.
      operations:
      - method: GET
        name: get
        description: List domains
        call: domains-domains.get
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Register domain
        call: domains-domains.post
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/domains/{domain}
      name: domains-domain
      description: REST surface for domains-domain.
      operations:
      - method: GET
        name: get
        description: Get domain
        call: domains-domains.get
        with:
          domain: rest.domain
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete
        description: Delete domain
        call: domains-domains.delete
        with:
          domain: rest.domain
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: domains-domains-mcp
    port: 9090
    transport: http
    description: MCP adapter for Gandi Domain API — Domains. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-domains
      description: List domains
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: domains-domains.get
      outputParameters:
      - type: object
        mapping: $.
    - name: register-domain
      description: Register domain
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: domains-domains.post
      outputParameters:
      - type: object
        mapping: $.
    - name: get-domain
      description: Get domain
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: domains-domains.get
      with:
        domain: tools.domain
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-domain
      description: Delete domain
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: domains-domains.delete
      with:
        domain: tools.domain
      outputParameters:
      - type: object
        mapping: $.
