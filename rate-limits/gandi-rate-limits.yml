specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Gandi
providerId: gandi
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Domains
  - DNS
  - Registrar
  - Rate Limiting
description: Gandi's Public API enforces a documented per-IP rate limit. The published cap is 1,000
  requests per minute per source IP address. Rate-limit response codes and dedicated headers are not
  enumerated in the public reference; clients should expect HTTP 429 on breach.
sources:
  - https://api.gandi.net/docs/
  - https://api.gandi.net/docs/reference/
responseCodes:
  throttled: 429
limits:
  - name: Public API per-IP limit
    scope: IP
    metric: requests_per_minute
    limit: 1000
    timeFrame: minute
policies:
  - name: Per-IP scoping
    description: The 1,000 req/min cap is enforced per source IP; multiple keys behind the same
      egress IP share the limit.
  - name: Backoff on 429
    description: Implement exponential backoff with jitter on 429 responses; honor any
      Retry-After header that may be returned.
  - name: Personal Access Tokens
    description: Authenticate with Personal Access Tokens (PATs) scoped to the resources the
      client needs.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
