description: Gandi prices its services on a per-resource basis — domain names by TLD, hosting and
  email by mailbox. The Public API (api.gandi.net) is free for account holders; charges apply only
  to resources purchased through it (domain registrations, mailbox plans, certificates, etc.).
  Free SSL/TLS certificates and DNS are bundled with each registered domain.
sources:
  - https://www.gandi.net/en/pricing
  - https://www.gandi.net/en-US/domain
  - https://api.gandi.net/docs/
